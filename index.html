<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>아이돌 수련회 1기 입소 신고 · Muniverse</title>

<style>
  :root{
    --green:#8FB35A;        /* page base green */
    --green-deep:#6E9440;
    --forest:#123A2E;       /* deep ink */
    --navy:#0F3B3A;         /* outline navy */
    --yellow:#F2C230;       /* 아이돌 */
    --blue:#49AAC4;         /* 수련회 */
    --mint:#34D399;         /* muniverse accent */
    --mint-2:#6EE7A8;
    --orange:#E8792B;       /* fire / tent */
    --paper:#FBF6E9;        /* certificate paper */
    --paper-2:#F3EAD2;
    --ink-soft:#3C5245;
    --card:#F6FAEF;
    --shadow:0 18px 40px rgba(15,59,58,.22);
    --radius:22px;
    font-synthesis-weight:none;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",system-ui,-apple-system,sans-serif;
    color:var(--forest);
    background:
      radial-gradient(120% 90% at 12% -10%, #A6C878 0%, transparent 55%),
      radial-gradient(120% 120% at 100% 0%, #7EA34E 0%, transparent 45%),
      var(--green);
    min-height:100dvh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:22px 20px 64px}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
  .brand{display:inline-flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.2px;color:#0d3a2c}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 3px rgba(52,211,153,.28)}
  .brand small{display:block;font-size:11px;font-weight:700;color:#245c46;opacity:.85;letter-spacing:.4px}
  /* language switch */
  .langs{display:flex;gap:5px;background:rgba(15,59,58,.10);padding:5px;border-radius:999px;backdrop-filter:blur(4px)}
  .langs button{
    border:0;background:transparent;color:#12402f;font-weight:700;font-size:12.5px;
    padding:7px 11px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;font-family:inherit;
  }
  .langs button[aria-pressed="true"]{background:#0f3b3a;color:#eafff4;box-shadow:0 4px 12px rgba(15,59,58,.3)}

  /* ---------- hero ---------- */
  .hero{
    position:relative;margin-top:10px;border-radius:26px;overflow:hidden;
    background:linear-gradient(180deg,#93B85E,#83A94F);
    border:2px solid rgba(15,59,58,.15);
    box-shadow:var(--shadow);
    padding:30px 26px 26px;
    text-align:center;
  }
  .eyebrow{
    display:inline-block;font-size:12px;font-weight:800;letter-spacing:.6px;
    color:#0f3b3a;background:rgba(255,255,255,.55);border:1.5px solid rgba(15,59,58,.35);
    padding:5px 13px;border-radius:999px;margin-bottom:14px;
  }
  .hero-logo{width:min(74%,430px);height:auto;display:block;margin:2px auto 12px;filter:drop-shadow(0 8px 16px rgba(15,59,58,.25))}
  .hero h1{margin:0 0 6px;font-size:clamp(20px,4.6vw,30px);font-weight:900;color:#0f3b2c;letter-spacing:-.4px}
  .hero p{margin:0;font-size:clamp(13px,2.9vw,15px);font-weight:600;color:#20452f}
  .period{margin-top:14px;display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;
    color:#0f3b3a;background:#F2C230;border:2px solid #0f3b3a;padding:7px 14px;border-radius:999px;
    box-shadow:0 4px 0 rgba(15,59,58,.25)}

  /* ---------- steps card ---------- */
  .panel{
    margin-top:20px;background:var(--card);border-radius:var(--radius);
    border:2px solid rgba(15,59,58,.12);box-shadow:var(--shadow);padding:22px 20px;
  }
  .panel h2{margin:0 0 4px;font-size:18px;font-weight:900;color:#123a2e;display:flex;align-items:center;gap:9px}
  .panel h2 .n{width:26px;height:26px;flex:0 0 26px;border-radius:9px;background:var(--mint);color:#08301f;
    font-size:14px;font-weight:900;display:grid;place-items:center;box-shadow:0 3px 0 rgba(15,59,58,.2)}
  .panel .sub{margin:0 0 16px;font-size:13px;color:var(--ink-soft);padding-left:35px}

  .field{margin-bottom:18px}
  .label{display:block;font-size:13.5px;font-weight:800;color:#1c4636;margin:0 0 9px}
  .label .opt{font-weight:600;color:#6c8375;font-size:12px;margin-left:6px}

  /* team grid */
  .teams{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .team{
    position:relative;cursor:pointer;border-radius:16px;padding:15px 14px;
    background:#fff;border:2px solid rgba(15,59,58,.14);transition:.15s;
    display:flex;align-items:center;gap:11px;font-weight:800;color:#1c3d30;
  }
  .team:hover{transform:translateY(-1px)}
  .team .chip{width:16px;height:16px;border-radius:5px;flex:0 0 16px;border:2px solid rgba(15,59,58,.35)}
  .team .nm{font-size:14.5px;letter-spacing:.2px}
  .team input{position:absolute;opacity:0;pointer-events:none}
  .team[data-on="true"]{border-color:var(--tc,#0f3b3a);box-shadow:0 0 0 3px var(--tc-soft,rgba(15,59,58,.15)),0 8px 16px rgba(15,59,58,.12);background:var(--tc-bg,#fff)}
  .team[data-on="true"] .tick{opacity:1;transform:scale(1)}
  .team .tick{margin-left:auto;width:22px;height:22px;border-radius:50%;background:var(--tc,#0f3b3a);color:#fff;
    display:grid;place-items:center;font-size:13px;opacity:0;transform:scale(.6);transition:.15s}

  input[type=text]{
    width:100%;font-family:inherit;font-size:15px;font-weight:600;color:#123a2e;
    background:#fff;border:2px solid rgba(15,59,58,.16);border-radius:14px;padding:14px 15px;transition:.15s;
  }
  input[type=text]:focus{outline:none;border-color:var(--mint);box-shadow:0 0 0 3px rgba(52,211,153,.22)}
  .count{text-align:right;font-size:11.5px;color:#7d9184;margin-top:6px;font-weight:600}

  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chips button{
    font-family:inherit;font-size:12.5px;font-weight:700;color:#215140;cursor:pointer;
    background:#EAF3DE;border:1.5px solid rgba(15,59,58,.15);border-radius:999px;padding:7px 12px;transition:.15s;
  }
  .chips button:hover{background:#dcecca}

  .cta{
    width:100%;margin-top:6px;font-family:inherit;font-size:16.5px;font-weight:900;letter-spacing:.2px;
    color:#08301f;cursor:pointer;border:2px solid #0f3b3a;border-radius:16px;padding:16px;
    background:linear-gradient(180deg,#6EE7A8,#34D399);box-shadow:0 6px 0 rgba(15,59,58,.28);transition:.1s;
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .cta:hover{transform:translateY(1px);box-shadow:0 5px 0 rgba(15,59,58,.28)}
  .cta:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(15,59,58,.28)}
  .cta[disabled]{opacity:.5;cursor:not-allowed;filter:grayscale(.3);box-shadow:0 6px 0 rgba(15,59,58,.2)}

  /* ---------- result ---------- */
  .result{margin-top:22px;display:none}
  .result.show{display:block;animation:pop .35s ease}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .cert-frame{
    background:var(--card);border-radius:var(--radius);border:2px solid rgba(15,59,58,.12);
    box-shadow:var(--shadow);padding:18px;text-align:center;
  }
  .cert-frame h2{margin:0 0 14px;font-size:16px;font-weight:900;color:#123a2e}
  #certCanvas{width:100%;max-width:420px;height:auto;border-radius:16px;box-shadow:0 12px 26px rgba(15,59,58,.25);display:block;margin:0 auto}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;max-width:420px;margin-left:auto;margin-right:auto}
  .btn{font-family:inherit;font-size:14.5px;font-weight:800;cursor:pointer;border-radius:14px;padding:14px;transition:.1s;
    display:flex;align-items:center;justify-content:center;gap:8px;border:2px solid #0f3b3a}
  .btn.primary{color:#08301f;background:linear-gradient(180deg,#FFD956,#F2C230);box-shadow:0 5px 0 rgba(15,59,58,.25)}
  .btn.ghost{color:#0f3b3a;background:#fff;box-shadow:0 5px 0 rgba(15,59,58,.15)}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(15,59,58,.2)}
  .btn.wide{grid-column:1/-1}
  #shareBtn{width:100%;max-width:420px;margin:12px auto 0}
  .btn.ig{color:#fff;background:linear-gradient(45deg,#F09433,#E6683C,#DC2743,#CC2366,#BC1888);border-color:#0f3b3a;box-shadow:0 5px 0 rgba(15,59,58,.28)}
  .btn.ig:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(15,59,58,.2)}
  .share-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;max-width:420px;margin-left:auto;margin-right:auto}
  .share-row .btn{flex:1;min-width:120px}
  .hashline{margin-top:14px;font-size:13px;font-weight:700;color:#2a5241;background:#EAF3DE;border:1.5px dashed rgba(15,59,58,.3);
    border-radius:12px;padding:11px 12px;cursor:pointer;max-width:420px;margin-left:auto;margin-right:auto;position:relative}
  .hashline:hover{background:#e2eecf}
  .hashline .copyhint{font-size:11px;color:#6c8375;font-weight:600;margin-top:3px}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:#0f3b3a;color:#eafff4;font-weight:700;font-size:13.5px;padding:12px 20px;border-radius:999px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.25s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* tabs */
  .tabs{display:flex;gap:6px;margin:14px 0 0;padding:6px;background:rgba(15,59,58,.10);border-radius:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:1 1 0;min-width:max-content;white-space:nowrap;border:0;background:transparent;color:#1c4636;font-family:inherit;font-weight:800;font-size:14px;padding:11px 13px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
  .tab.active{background:#0f3b3a;color:#eafff4;box-shadow:0 4px 12px rgba(15,59,58,.3)}
  .tab.locked{color:#71857a;cursor:not-allowed}
  .tab.locked:active{transform:scale(.98)}
  .tab .lock{font-size:12px;opacity:.75}
  .tab .soon{font-style:normal;font-size:10px;font-weight:800;color:#8a9d90;background:rgba(15,59,58,.12);border-radius:999px;padding:2px 6px}
  /* calendar */
  .cal-legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:0 0 16px}
  .cal-legend .lg{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#2a4a3b}
  .cal-legend .sw{width:12px;height:12px;border-radius:4px;flex:0 0 12px}
  .cal-month{text-align:center;font-weight:900;font-size:16px;color:#123a2e;margin:2px 0 12px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-grid .wd{text-align:center;font-size:12px;font-weight:800;color:#7d9184;padding:2px 0}
  .cal-grid .wd.sun{color:#c0564a}
  .cal-cell{aspect-ratio:1/1;border-radius:10px;background:#fff;border:1.5px solid rgba(15,59,58,.10);display:flex;flex-direction:column;align-items:center;padding:6px 2px 3px}
  .cal-cell.empty{background:transparent;border:0}
  .cal-cell .dnum{font-size:12.5px;font-weight:800;color:#31463b;line-height:1}
  .cal-cell.sun .dnum{color:#c0564a}
  .cal-cell .mk{margin-top:auto;display:flex;gap:3px;min-height:8px;align-items:center}
  .cal-cell .dot{width:7px;height:7px;border-radius:50%}
  .cal-cell.has{border-color:rgba(15,59,58,.22);box-shadow:0 2px 8px rgba(15,59,58,.09)}
  .cal-aug{margin-top:16px;display:flex;align-items:center;gap:11px;background:#E9F5EE;border:2px solid #2E9E6B;border-radius:14px;padding:12px 14px}
  .cal-aug .badge{flex:0 0 auto;font-size:12px;font-weight:900;color:#fff;background:#2E9E6B;border-radius:999px;padding:6px 11px;white-space:nowrap}
  .cal-aug .txt{font-size:13.5px;font-weight:800;color:#1c4636}

  footer{margin-top:34px;text-align:center;color:#20452f;font-size:12px;opacity:.85}
  footer b{color:#0f3b2c}

  @media (max-width:480px){
    .wrap{padding:16px 14px 54px}
    .actions{grid-template-columns:1fr}
    .brand small{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

    <button class="cta" id="issueBtn" disabled>
      <span>🎫</span><span data-i18n="issueBtn"></span>
    </button>
  </section>

  <!-- RESULT -->
  <section class="result" id="result">
    <div class="cert-frame">
      <h2 data-i18n="certReady"></h2>
      <canvas id="certCanvas" width="1080" height="1350" role="img"></canvas>
      <div class="actions">
        <button class="btn primary" id="dlBtn"><span>⬇️</span><span data-i18n="download"></span></button>
        <button class="btn ghost" id="againBtn"><span>↺</span><span data-i18n="again"></span></button>
      </div>
      <div class="share-row">
        <button class="btn ig" id="igBtn"><span>📸</span><span data-i18n="shareIG"></span></button>
        <button class="btn ghost" id="xBtn"><span>𝕏</span><span data-i18n="shareX"></span></button>

      <button class="btn ghost" id="shareBtn"><span>📤</span><span data-i18n="share"></span></button>
      <div class="hashline" id="hashline">
        <div id="hashText"></div>
        <div class="copyhint" data-i18n="tapCopy"></div>
      </div>
    </div>
  </section>

  <!-- BROADCAST SCHEDULE (입소 탭 하단) -->
  <section class="panel" id="schedule">
    <h2><span class="n">📅</span><span data-i18n="schTitle">방송 일정</span></h2>
    <p class="sub" data-i18n="schSub"></p>
    <div class="cal-legend">
      <span class="lg"><span class="sw" style="background:#C0392B"></span><span data-i18n="chMBC">MBC M</span></span>
      <span class="lg"><span class="sw" style="background:#E8792B"></span><span data-i18n="chYT">Muniverse YouTube</span></span>
      <span class="lg"><span class="sw" style="background:#2E9E6B"></span><span data-i18n="chApp">뮤니버스 앱 단독 확장판</span></span>
    </div>
    <div id="cal"></div>
    <div class="cal-aug">
      <span class="badge" data-i18n="augTag">8월 대공개</span>
      <span class="txt" data-i18n="chApp">뮤니버스 앱 단독 확장판</span>
    </div>
  </section>

  <footer>
    <span data-i18n="footer"></span> · <b>#아이돌수련회</b>
  </footer>
</div>

<div class="toast" id="toast"></div>

/* -------- STATE -------- */
let lang = (()=> {
  const n = (navigator.language||"ko").toLowerCase();
  if(n.startsWith("ko")) return "ko";
  if(n.startsWith("ja")) return "ja";
  if(n.startsWith("zh")) return n.includes("tw")||n.includes("hk")||n.includes("hant") ? "zh-TW" : "zh-CN";
  if(n.startsWith("en")) return "en";
  return "ko";
})();
let selectedTeam = null;
const logoImg = new Image();
logoImg.src = LOGO_SRC;

/* -------- DOM helpers -------- */
const $ = s=>document.querySelector(s);
const t = ()=>I18N[lang];

function buildLangs(){
  const box = $("#langs");
  box.innerHTML = "";
  LANGS.forEach(L=>{
    const b=document.createElement("button");
    b.textContent=L.label;
    b.setAttribute("aria-pressed", L.code===lang);
    b.onclick=()=>{ lang=L.code; document.documentElement.lang=L.code; applyI18n(); };
    box.appendChild(b);
  });
}
function buildTeams(){
  const box=$("#teams"); box.innerHTML="";
  CONFIG.teams.forEach(tm=>{
    const el=document.createElement("label");
    el.className="team"; el.dataset.on = (selectedTeam===tm.id);
    el.style.setProperty("--tc", tm.color);
    el.style.setProperty("--tc-bg", tm.bg);
    el.style.setProperty("--tc-soft", tm.color+"33");
    el.innerHTML =
      `<span class="chip" style="background:${tm.color}"></span>
       <span class="nm">${tm.name}</span>
       <span class="tick">✓</span>
       <input type="radio" name="team" value="${tm.id}">`;
    el.querySelector("input").onchange=()=>{ selectedTeam=tm.id; buildTeams(); validate(); };
    box.appendChild(el);
  });
}
function buildChips(){
  const box=$("#msgChips"); box.innerHTML="";
  t().cChips.forEach(c=>{
    const b=document.createElement("button"); b.type="button"; b.textContent=c;
    b.onclick=()=>{ $("#msg").value=c.slice(0,24); $("#msgCount").textContent=$("#msg").value.length; };
    box.appendChild(b);
  });
}
function buildCalendar(){
  const T=t(), wd=T.calWeekdays;
  const marks={8:'mbc',15:'mbc',10:'yt',17:'yt',24:'yt',31:'yt'};
  const colors={mbc:'#C0392B',yt:'#E8792B'};
  const first=3, days=31; // 2026-07-01 = Wednesday (Sun=0)
  let h=`<div class="cal-month">${T.calMonth}</div><div class="cal-grid">`;
  wd.forEach((d,i)=> h+=`<div class="wd${i===0?' sun':''}">${d}</div>`);
  for(let i=0;i<first;i++) h+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){ const col=(first+d-1)%7, m=marks[d];
    h+=`<div class="cal-cell${col===0?' sun':''}${m?' has':''}"><span class="dnum">${d}</span><span class="mk">${m?`<span class="dot" style="background:${colors[m]}"></span>`:''}</span></div>`; }
  h+=`</div>`;
  const el=document.getElementById('cal'); if(el) el.innerHTML=h;
}
function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k=el.getAttribute("data-i18n"); if(t()[k]!=null) el.textContent=t()[k];
  });
  $("#nick").placeholder=t().nickPh;
  $("#msg").placeholder=t().msgPh;
  $("#hashText").textContent = tags().join(" ");
  buildLangs(); buildChips(); buildCalendar();
  // re-render certificate if visible
  if($("#result").classList.contains("show")) renderCert();
}
function validate(){
  const ok = selectedTeam && $("#nick").value.trim().length>0;
  $("#issueBtn").disabled=!ok;
}

/* -------- utils -------- */
function tags(){ const h=t().hashtags; return (h&&h.length)?h:CONFIG.hashtags; }
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0;} return h; }
function passNo(nick, team){
  const seed=hashStr(nick+"|"+team+"|"+new Date().toDateString());
  const num=(seed%90000+10000);
  return `${CONFIG.passPrefix}-${CONFIG.gisu}-${num}`;
}
function teamById(id){ return CONFIG.teams.find(x=>x.id===id)||CONFIG.teams[0]; }
function toast(msg){ const el=$("#toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),1900); }

/* -------- CERTIFICATE RENDER (Canvas 1080x1350) -------- */
function roundRect(ctx,x,y,w,h,r){ if(typeof r==="number") r={tl:r,tr:r,br:r,bl:r};
  ctx.beginPath();
  ctx.moveTo(x+r.tl,y);
  ctx.lineTo(x+w-r.tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r.tr);
  ctx.lineTo(x+w,y+h-r.br); ctx.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
  ctx.lineTo(x+r.bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r.bl);
  ctx.lineTo(x,y+r.tl); ctx.quadraticCurveTo(x,y,x+r.tl,y); ctx.closePath();
}
function fitText(ctx,text,max,base,min){
  let s=base; do{ ctx.font=`900 ${s}px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`; if(ctx.measureText(text).width<=max) break; s-=2; }while(s>min); return s;
}

function drawStar(ctx,cx,cy,r,fill,stroke){
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=Math.PI/2*3 + i*2*Math.PI/5;
    ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    const a2=a+Math.PI/5;
    ctx.lineTo(cx+Math.cos(a2)*r*0.45, cy+Math.sin(a2)*r*0.45);
  }
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
  if(stroke){ctx.lineWidth=3;ctx.strokeStyle=stroke;ctx.stroke();}
}

// text along a circle (position: 'top' reads L→R over the top, 'bottom' reads L→R under the bottom)
function drawArcText(ctx, str, cx, cy, r, opts){
  const chars=[...str];
  ctx.save();
  ctx.font=opts.font; ctx.fillStyle=opts.color; ctx.textAlign="center"; ctx.textBaseline="middle";
  const gap=opts.letterSpacing||0;
  const w=chars.map(ch=>ctx.measureText(ch).width/r);
  const total=w.reduce((a,b)=>a+b,0)+gap*(chars.length-1);
  if(opts.position==="bottom"){
    let a=Math.PI/2+total/2;
    for(let i=0;i<chars.length;i++){ const mid=a-w[i]/2;
      ctx.save(); ctx.translate(cx+r*Math.cos(mid),cy+r*Math.sin(mid)); ctx.rotate(mid-Math.PI/2); ctx.fillText(chars[i],0,0); ctx.restore();
      a-=w[i]+gap; }
  } else {
    let a=-Math.PI/2-total/2;
    for(let i=0;i<chars.length;i++){ const mid=a+w[i]/2;
      ctx.save(); ctx.translate(cx+r*Math.cos(mid),cy+r*Math.sin(mid)); ctx.rotate(mid+Math.PI/2); ctx.fillText(chars[i],0,0); ctx.restore();
      a+=w[i]+gap; }
  }
  ctx.restore();
}

// custom 아이돌 수련회 seal: double ring + arc text + tent icon
function drawCampStamp(ctx, cx, cy, color){
  ctx.save();
  ctx.translate(cx,cy); ctx.rotate(-Math.PI/12); ctx.globalAlpha=.92;
  ctx.lineJoin="round"; ctx.lineCap="round";
  const R=82;
  ctx.strokeStyle=color; ctx.lineWidth=5.5; ctx.beginPath(); ctx.arc(0,0,R,0,Math.PI*2); ctx.stroke();
  ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(0,0,R-40,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([2,7]); ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,R-9,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
  // arc text
  const CJK=`"Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  drawArcText(ctx,"아이돌 수련회",0,0,R-23,{font:`900 19px ${CJK}`,color,position:"top",letterSpacing:0.02});
  drawArcText(ctx,"Muniverse",0,0,R-24,{font:`800 15px "Pretendard",system-ui,sans-serif`,color,position:"bottom",letterSpacing:0.10});
  // separators
  drawStar(ctx,-(R-23),0,6,color,null);
  drawStar(ctx,(R-23),0,6,color,null);
  // center tent
  ctx.strokeStyle=color; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(0,-19); ctx.lineTo(24,16); ctx.lineTo(-24,16); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-19); ctx.lineTo(0,16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9,16); ctx.lineTo(0,1); ctx.lineTo(9,16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-19); ctx.lineTo(0,-31); ctx.stroke();
  ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(0,-31); ctx.lineTo(13,-27); ctx.lineTo(0,-23); ctx.closePath(); ctx.fill();
  ctx.restore();
}

async function renderCert(){
  const c=$("#certCanvas"), ctx=c.getContext("2d");
  const W=c.width, H=c.height;
  const T=t();
  const tm=teamById(selectedTeam);
  const nick=($("#nick").value.trim()||"GUEST").slice(0,16);
  const msg=$("#msg").value.trim();
  const now=new Date();
  const dateStr=T.dateFmt(now.getFullYear(), now.getMonth()+1, now.getDate());
  const pno=passNo(nick, tm.id);

  try{ await document.fonts.ready; }catch(e){}

  // ---- background: kraft green outer + paper card ----
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,"#9BC163"); bg.addColorStop(1,"#7FA24C");
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // scattered grass ticks
  ctx.strokeStyle="rgba(15,59,58,.13)"; ctx.lineWidth=4; ctx.lineCap="round";
  for(let i=0;i<70;i++){ const x=(hashStr("gx"+i)%W), y=(hashStr("gy"+i)%H); ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+ (i%2?7:-7), y-16); ctx.stroke(); }

  // paper card
  const M=54, cardW=W-M*2, cardH=H-M*2;
  ctx.save();
  ctx.shadowColor="rgba(15,59,58,.28)"; ctx.shadowBlur=40; ctx.shadowOffsetY=18;
  roundRect(ctx,M,M,cardW,cardH,40); ctx.fillStyle="#FBF6E9"; ctx.fill();
  ctx.restore();
  // inner dashed frame
  roundRect(ctx,M+26,M+26,cardW-52,cardH-52,28);
  ctx.setLineDash([12,10]); ctx.lineWidth=3; ctx.strokeStyle=tm.color; ctx.globalAlpha=.55; ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;
  // team color header band
  roundRect(ctx,M,M,cardW,120,{tl:40,tr:40,br:0,bl:0}); ctx.fillStyle=tm.color; ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.95)"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font=`800 26px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  ctx.fillText(T.cSeries, W/2, M+62);

  let cy = M+120;

  // logo
  if(logoImg.complete && logoImg.naturalWidth){
    const lw=Math.min(560, cardW-160), lh=lw*logoImg.naturalHeight/logoImg.naturalWidth;
    ctx.drawImage(logoImg,(W-lw)/2, cy+18, lw, lh);
    cy += lh+34;
  } else { cy += 60; }

  // ribbon title 「입소 신고증」 (+ Korean 입소증 for non-KO)
  const hasSub = !!(T.cTitleSub && T.cTitleSub.length);
  const rw=Math.min(600,cardW-120), rh=hasSub?106:88, rx=(W-rw)/2;
  ctx.save();
  ctx.shadowColor="rgba(15,59,58,.18)"; ctx.shadowBlur=16; ctx.shadowOffsetY=8;
  roundRect(ctx,rx,cy,rw,rh,20); ctx.fillStyle="#0F3B3A"; ctx.fill();
  ctx.restore();
  ctx.textAlign="center"; ctx.textBaseline="middle";
  if(hasSub){
    const ts=fitText(ctx,T.cTitle,rw-100,40,24);
    ctx.font=`900 ${ts}px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
    ctx.fillStyle="#F2C230"; ctx.fillText(T.cTitle, W/2, cy+rh/2-15);
    ctx.font=`800 26px "Pretendard","Noto Sans KR",sans-serif`;
    ctx.fillStyle="#6EE7A8"; ctx.fillText(T.cTitleSub, W/2, cy+rh/2+24);
  } else {
    const ts=fitText(ctx,T.cTitle,rw-70,44,26);
    ctx.font=`900 ${ts}px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
    ctx.fillStyle="#F2C230"; ctx.fillText(T.cTitle, W/2, cy+rh/2+2);
  }
  drawStar(ctx,rx+34,cy+rh/2,12,"#F2C230","#0F3B3A");
  drawStar(ctx,rx+rw-34,cy+rh/2,12,"#F2C230","#0F3B3A");
  cy += rh+40;

  // NICKNAME
  ctx.textAlign="center";
  ctx.fillStyle="#7C8F81"; ctx.font=`800 24px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  ctx.fillText(T.cNick, W/2, cy); cy+=18;
  const ns=fitText(ctx,nick,cardW-180,92,40);
  ctx.font=`900 ${ns}px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  ctx.textBaseline="top";
  ctx.lineJoin="round"; ctx.lineWidth=10; ctx.strokeStyle="#0F3B3A"; ctx.strokeText(nick,W/2,cy);
  ctx.fillStyle="#F2C230"; ctx.fillText(nick,W/2,cy);
  cy += ns+30;

  // team pill
  ctx.font=`800 34px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  const tName=tm.name, tpw=ctx.measureText(tName).width+120, tph=64, tpx=(W-tpw)/2;
  roundRect(ctx,tpx,cy,tpw,tph,32); ctx.fillStyle=tm.bg; ctx.strokeStyle=tm.color; ctx.lineWidth=4; ctx.fill(); ctx.stroke();
  ctx.fillStyle=tm.color; ctx.beginPath(); ctx.arc(tpx+38,cy+tph/2,11,0,7); ctx.fill();
  ctx.textBaseline="middle"; ctx.fillText(tName, tpx+tpw/2+14, cy+tph/2+1);
  cy += tph+40;

  // divider
  ctx.strokeStyle="rgba(15,59,58,.18)"; ctx.lineWidth=2; ctx.setLineDash([2,8]); ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(M+90,cy); ctx.lineTo(W-M-90,cy); ctx.stroke(); ctx.setLineDash([]);
  cy += 34;

  // info grid: 입소번호 | 입소일
  const gx=M+80, gw=cardW-160;
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillStyle="#7C8F81"; ctx.font=`700 22px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  ctx.fillText(T.cNo, gx, cy);
  ctx.fillText(T.cDate, gx+gw/2, cy);
  ctx.fillStyle="#123A2E"; ctx.font=`900 30px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  ctx.fillText(pno, gx, cy+38);
  ctx.fillText(dateStr, gx+gw/2, cy+38);
  cy += 92;

  // optional message quote
  if(msg){
    const qw=cardW-160;
    roundRect(ctx,M+80,cy,qw,72,18); ctx.fillStyle="#EFF5E7"; ctx.fill();
    ctx.fillStyle=tm.color; ctx.font=`900 40px Georgia,serif`; ctx.textAlign="left"; ctx.fillText("“",M+96,cy+50);
    ctx.fillStyle="#2A4A3B"; ctx.textAlign="center"; ctx.textBaseline="middle";
    const ms=fitText(ctx,msg,qw-120,30,20);
    ctx.font=`700 ${ms}px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
    ctx.fillText(msg, W/2, cy+38);
    cy += 92;
  }

  // slogan
  ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillStyle="#3C5245";
  const ss=fitText(ctx,T.cSlogan,cardW-150,24,16);
  ctx.font=`600 ${ss}px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  ctx.fillText(T.cSlogan, W/2, cy+6);

  // 아이돌 수련회 camp seal (rotated)
  drawCampStamp(ctx, W-M-152, H-M-160, tm.color);

  // footer hashtag on card
  ctx.globalAlpha=1; ctx.fillStyle="#8AA07E"; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.font=`700 22px "Pretendard","Noto Sans KR","Noto Sans SC","Noto Sans TC","Noto Sans JP",sans-serif`;
  ctx.fillText(tags().join("  "), W/2, H-M-40);
}

/* -------- actions -------- */
function fileName(){ return `아이돌수련회_입소증_${($("#nick").value.trim()||"guest")}.png`; }
function canvasBlob(){ return new Promise(res=>$("#certCanvas").toBlob(res,"image/png")); }

async function issue(){
  $("#result").classList.add("show");
  await renderCert();
  $("#result").scrollIntoView({behavior:"smooth",block:"start"});
  logEnrollment();
}
async function download(){
  const blob=await canvasBlob();
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fileName(); a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
  toast(t().download+" ✓");
}
function caption(){
  const tm=teamById(selectedTeam);
  const cap=t().shareCaption.replace("{team}", tm.name);
  return cap+"\n"+tags().join(" ")+(CONFIG.shareUrl?("\n"+CONFIG.shareUrl):"");
}
async function nativeShare(){
  const blob=await canvasBlob();
  const file=new File([blob], fileName(), {type:"image/png"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], text:caption()}); return; }catch(e){ if(e.name==="AbortError") return; }
  }
  // fallback
  await download(); await copyHash(); toast(t().download+" · "+t().tapCopy+" ✓");
}
async function shareInstagram(){
  const blob=await canvasBlob();
  const file=new File([blob], fileName(), {type:"image/png"});
  // Mobile: native share sheet includes Instagram (Feed/Stories/Direct)
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], text:caption()}); return; }
    catch(e){ if(e.name==="AbortError") return; }
  }
  // Fallback (desktop): save image + copy caption + open Instagram
  await download();
  try{ await navigator.clipboard.writeText(caption()); }catch(e){}
  const mobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  window.open(mobile ? "instagram://library" : "https://www.instagram.com/", "_blank", "noopener");
  toast(t().igGuide);
}
function shareX(){
  const url=`https://twitter.com/intent/tweet?text=${encodeURIComponent(caption())}`;
  window.open(url,"_blank","noopener");
}
async function copyHash(){
  try{ await navigator.clipboard.writeText(tags().join(" ")); toast("✓ "+tags().join(" ")); }
  catch(e){ toast(tags().join(" ")); }
}

/* -------- Supabase logging (optional, non-blocking) -------- */
async function logEnrollment(){
  const S=CONFIG.supabase;
  if(!S.url || !S.anonKey) return; // disabled
  try{
    await fetch(`${S.url}/rest/v1/${S.table}`,{
      method:"POST",
      headers:{ "Content-Type":"application/json", "apikey":S.anonKey, "Authorization":"Bearer "+S.anonKey, "Prefer":"return=minimal" },
      body:JSON.stringify({
        team:selectedTeam, nickname:$("#nick").value.trim(),
        pass_no:passNo($("#nick").value.trim(),selectedTeam),
        lang, created_at:new Date().toISOString()
      })
    });
  }catch(e){ /* never block the user */ }
}

/* -------- wire up -------- */
$("#nick").addEventListener("input",e=>{ $("#nickCount").textContent=e.target.value.length; validate(); });
$("#msg").addEventListener("input",e=>{ $("#msgCount").textContent=e.target.value.length; });
$("#issueBtn").addEventListener("click",issue);
$("#dlBtn").addEventListener("click",download);
$("#againBtn").addEventListener("click",()=>{ $("#result").classList.remove("show"); $("#formPanel").scrollIntoView({behavior:"smooth"}); });
$("#shareBtn").addEventListener("click",nativeShare);
$("#igBtn").addEventListener("click",shareInstagram);
$("#xBtn").addEventListener("click",shareX);
$("#hashline").addEventListener("click",copyHash);
document.querySelectorAll('.tab').forEach(tb=>{
  tb.addEventListener('click',()=>{ if(tb.classList.contains('locked')) toast(t().soonToast); });
});
$("#heroLogo").src=LOGO_SRC;

document.documentElement.lang=lang;
buildTeams();
applyI18n();
logoImg.onload=()=>{ if($("#result").classList.contains("show")) renderCert(); };
</script>
